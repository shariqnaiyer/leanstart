namespace: lean-devnet
genesis:
  configMapName: genesis-config
  pvcName: genesis-data
  storageClass: ''
  storageSize: 5Gi
clients:
- name: ream
  image: snaiyer1/ream:latest
  replicas: 1
  args:
  - - --data-dir
    - /data
    - lean_node
    - --network
    - /config/config.yaml
    - --validator-registry-path
    - /config/annotated_validators.yaml
    - --bootnodes
    - /config/nodes.yaml
    - --node-id
    - ream_0
    - --private-key-path
    - /config/ream_0.key
    - --socket-port
    - '9000'
    - --metrics
    - --metrics-address
    - 0.0.0.0
    - --metrics-port
    - '8080'
    - --http-address
    - 0.0.0.0
    - --http-port
    - '5055'
    - --is-aggregator
  seccompUnconfined: false
  hasHttpPort: true
- name: zeam-node0
  image: zeam:local
  replicas: 1
  args:
  - - node
    - --custom_genesis
    - /config
    - --validator_config
    - /config
    - --data-dir
    - /data
    - --node-id
    - zeam_0
    - --node-key
    - /config/zeam_0.key
    - --metrics_enable
    - --api-port
    - '8080'
  seccompUnconfined: true
  hasHttpPort: false
- name: zeam-node1
  image: zeam:local
  replicas: 1
  args:
  - - node
    - --custom_genesis
    - /config
    - --validator_config
    - /config
    - --data-dir
    - /data
    - --node-id
    - zeam_1
    - --node-key
    - /config/zeam_1.key
    - --metrics_enable
    - --api-port
    - '8080'
  seccompUnconfined: true
  hasHttpPort: false
initScripts:
  resolverImage: busybox:1.36
bootnodeCount: 5
prometheus:
  enabled: false
